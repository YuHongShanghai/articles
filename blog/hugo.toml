# 若 GitHub 仓库名不是 articles，请同步修改 baseURL 与 .github/workflows/hugo-pages.yml 中的 HUGO_BASEURL
baseURL = "https://yuhongshanghai.github.io/articles/"
languageCode = "zh-cn"
title = "技术笔记"
theme = "PaperMod"

enableGitInfo = true
enableRobotsTXT = true
buildDrafts = false
disablePathToLower = true

# GitHub Project Pages：站点在 /articles/ 子路径；PaperMod 菜单多为「根路径」形式，需生成相对 URL
relativeURLs = true

[pagination]
pagerSize = 10

[minify]
disableXML = true

[params]
env = "production"
description = "音视频、流媒体、OpenGL 与 ffplay 源码笔记"
author = "YuHong"
defaultTheme = "auto"
ShowReadingTime = true
ShowWordCount = true
ShowLastMod = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowRssButtonInSectionTermList = true
ShowAllPagesInArchive = true
ShowPageNums = true
ShowToc = true
comments = false
displayFullLangName = true
hideFooter = false

# 首页：头像 + 标题 + 快捷入口（比纯文字 homeInfo 更「站」一点）
[params.profileMode]
enabled = true
title = "技术笔记"
subtitle = "音视频 · 流媒体 · OpenGL · ffplay 源码与实战"
imageUrl = "https://github.com/YuHongShanghai.png"
imageTitle = "YuHong"
imageWidth = 120
imageHeight = 120

[[params.profileMode.buttons]]
name = "音视频入门"
url = "/intro/"

[[params.profileMode.buttons]]
name = "流媒体 / WebRTC"
url = "/streaming/"

[[params.profileMode.buttons]]
name = "OpenGL"
url = "/opengl/"

[[params.profileMode.buttons]]
name = "ffplay 源码"
url = "/ffplay/"

[[params.profileMode.buttons]]
name = "归档"
url = "/archives/"

[[params.socialIcons]]
name = "github"
url = "https://github.com/YuHongShanghai"

[markup.goldmark.renderer]
unsafe = true

[[menu.main]]
identifier = "intro"
name = "音视频入门"
url = "/intro/"
weight = 10

[[menu.main]]
identifier = "streaming"
name = "流媒体 / WebRTC"
url = "/streaming/"
weight = 20

[[menu.main]]
identifier = "opengl"
name = "OpenGL 教程"
url = "/opengl/"
weight = 30

[[menu.main]]
identifier = "ffplay"
name = "ffplay 源码"
url = "/ffplay/"
weight = 40

[[menu.main]]
identifier = "archive"
name = "归档"
url = "/archives/"
weight = 90

# 将仓库内已有 Markdown 挂到 content 下，无需复制正文
[[module.mounts]]
source = "../音视频入门教程/publish"
target = "content/intro"

[[module.mounts]]
source = "../articles-streaming/publish"
target = "content/streaming"

[[module.mounts]]
source = "../opengl教程/publish"
target = "content/opengl"

[[module.mounts]]
source = "../ffplay源码解析"
target = "content/ffplay"
