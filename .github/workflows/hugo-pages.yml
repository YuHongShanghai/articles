name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.161.1"
          extended: true

      - name: Fetch PaperMod theme
        working-directory: blog
        run: |
          rm -rf themes/PaperMod
          git clone --depth 1 https://github.com/adityatelange/hugo-PaperMod.git themes/PaperMod

      - name: Build
        working-directory: blog
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          HUGO_BASEURL="https://${OWNER_LC}.github.io/${{ github.event.repository.name }}/"
          echo "Building with baseURL=${HUGO_BASEURL}"
          hugo --minify --gc --baseURL "${HUGO_BASEURL}"

      # PaperMod 用 RelPermalink 生成 /assets/...，在 github.io/<repo>/ 子路径下会指向域名根导致 CSS 404
      - name: Patch asset URLs for GitHub Pages project site
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          touch blog/public/.nojekyll
          python3 << 'PY'
          import os, pathlib
          prefix = "/" + os.environ["REPO_NAME"]
          root = pathlib.Path("blog/public")
          pairs = [
              ('href="/assets/', f'href="{prefix}/assets/'),
              ('src="/assets/', f'src="{prefix}/assets/'),
          ]
          exts = {".html", ".htm", ".xml", ".json", ".svg"}
          for path in root.rglob("*"):
              if not path.is_file() or path.suffix.lower() not in exts:
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except (UnicodeDecodeError, OSError):
                  continue
              new = text
              for a, b in pairs:
                  new = new.replace(a, b)
              if new != text:
                  path.write_text(new, encoding="utf-8")
          PY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blog/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
